# Development only — do not use in production without adding passwords and restricting port bindings
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: knect
      POSTGRES_PASSWORD: knect
      POSTGRES_DB: knect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knect -d knect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
